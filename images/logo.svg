<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86C8D8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#AFDCE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CAE9F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86C8D8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ADD8E4;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Abstract north arrow / compass shape -->
  <polygon points="100,15 140,85 100,65 60,85" fill="url(#grad1)" />
  <polygon points="100,65 140,85 130,140 100,120 70,140 60,85" fill="url(#grad2)" />
  <!-- Small accent diamond -->
  <polygon points="100,130 115,150 100,170 85,150" fill="#86C8D8" opacity="0.7" />
  <!-- Subtle orbit ring -->
  <ellipse cx="100" cy="95" rx="65" ry="20" fill="none" stroke="#86C8D8" stroke-width="1.5" opacity="0.3" transform="rotate(-15 100 95)" />
</svg>
